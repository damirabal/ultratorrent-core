# UltraTorrent — full stack composition.
# Usage: cp .env.example .env && docker compose up -d --build
# Profiles: `rtorrent` (bundled engine), `prowlarr` (indexer manager),
#           `flaresolverr` (Cloudflare solver for Prowlarr), `proxy` (edge proxy).

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ultratorrent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ultratorrent}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ultratorrent}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      # Optionally stamp the exact git tag/sha/build-time into the image:
      #   GIT_TAG=$(git describe --tags --always --dirty) GIT_SHA=$(git rev-parse HEAD) \
      #   BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ) docker compose up -d --build
      # Left empty, the backend falls back to `v<VERSION>` for the tag.
      args:
        GIT_TAG: ${GIT_TAG:-}
        GIT_SHA: ${GIT_SHA:-}
        BUILD_TIME: ${BUILD_TIME:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Derived from POSTGRES_* so it can't drift from the DB password. Use an
      # alphanumeric POSTGRES_PASSWORD (URL-special chars would need encoding).
      DATABASE_URL: postgresql://${POSTGRES_USER:-ultratorrent}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ultratorrent}?schema=public
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Required in production: must be set, >=32 chars, and DIFFERENT from
      # JWT_ACCESS_SECRET (the backend refuses to boot otherwise).
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      FILE_MANAGER_ROOTS: ${FILE_MANAGER_ROOTS:-/downloads}
      # Comma-separated hosts/IPs/CIDRs whose torrent URLs may resolve to
      # private/internal addresses (e.g. a self-hosted indexer that returns
      # .torrent proxy links). Defaults to `prowlarr` so the BUNDLED Prowlarr
      # (profile `prowlarr`, reached at http://prowlarr:9696) works out of the
      # box — its proxy links resolve to a private Docker IP that the SSRF guard
      # would otherwise block, silently failing auto-downloads. If you override
      # this to trust another indexer, KEEP `prowlarr` in the list when you use
      # the bundled one, e.g. SSRF_ALLOW_HOSTS=prowlarr,indexer.lan. Set it empty
      # for full SSRF protection when you don't use a private-IP indexer.
      SSRF_ALLOW_HOSTS: ${SSRF_ALLOW_HOSTS:-prowlarr}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@ultratorrent.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
    volumes:
      - downloads:/downloads
    # Not published to the host by default — the frontend reaches it over the
    # internal Docker network. To expose the API directly, add a mapping, e.g.
    # `ports: ["4000:4000"]` (or a free host port).
    expose: ["4000"]
    networks: [internal]

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_WS_URL: /
    restart: unless-stopped
    depends_on: [backend]
    # Host port is configurable — set FRONTEND_PORT in .env if 8080 is taken.
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    networks: [internal]

  # Optional bundled rTorrent engine. Enable with: --profile rtorrent
  # Minimal headless rtorrent that serves SCGI over TCP on 0.0.0.0:5000, so the
  # backend reaches it at rtorrent:5000. Configure an engine in the UI:
  # kind rtorrent, mode scgi-tcp, host `rtorrent`, port 5000.
  rtorrent:
    build:
      context: ./deploy/rtorrent
    profiles: ["rtorrent"]
    restart: unless-stopped
    # The entrypoint starts as root, chowns the downloads volume, then drops to
    # PUID:PGID via gosu. Some hosts (notably Synology DSM) strip these two
    # capabilities from the container's default set, which makes that drop fail
    # ("operation not permitted") and the entrypoint fall back to running as
    # root. SETUID/SETGID are part of Docker's default caps — re-adding them here
    # simply restores that default so the privilege drop works and downloads are
    # owned by PUID:PGID rather than root.
    cap_add: ["SETUID", "SETGID"]
    environment:
      # Run rtorrent as this uid/gid so downloads are owned how you want. If your
      # downloads folder belongs to another user (e.g. Plex), set PUID/PGID to
      # that user's id/gid in .env (find them with `id <user>`). Default 1000
      # matches the backend's `node` user.
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # DHT is off by default (this rtorrent build can crash on a DHT
      # internal_error). Trackers + PEX still find peers. Set RT_DHT=on to enable.
      RT_DHT: ${RT_DHT:-off}
    volumes:
      - downloads:/downloads
    expose: ["5000"]
    networks: [internal]
    # rtorrent 0.9.8 can hit a fatal internal_error and exit (the restart policy
    # above then relaunches it). A crash exits the process so Docker already
    # recovers it; this healthcheck surfaces the rarer "process alive but SCGI
    # wedged" state as `unhealthy`. Checks the SCGI control port is listening
    # (`ss` ships with the iproute2 package in deploy/rtorrent/Dockerfile).
    healthcheck:
      test: ["CMD-SHELL", "ss -H -ltn 'sport = :5000' | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional bundled Prowlarr indexer manager. Enable with: --profile prowlarr
  # A separate companion container (not part of UltraTorrent) that manages
  # Torznab/Newznab indexers. UltraTorrent links to it via Settings →
  # Integrations → Prowlarr; the backend reaches it at http://prowlarr:9696 over
  # the internal network. Off by default; UltraTorrent boots fine without it.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    profiles: ["prowlarr"]
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - prowlarr_config:/config
    # Published so operators can reach the Prowlarr web UI directly. Change
    # PROWLARR_PORT in .env if 9696 is taken. Remove this mapping to keep it
    # reachable only from inside the internal network (via the UltraTorrent link).
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    networks: [internal]

  # Optional FlareSolverr — solves Cloudflare anti-bot challenges for Prowlarr
  # indexers (e.g. EZTV) that would otherwise fail with a "blocked by Cloudflare"
  # error. A backend helper (like rtorrent): internal-network only, no host port.
  # Enable with: --profile flaresolverr (alongside --profile prowlarr). Then in
  # Prowlarr add an indexer proxy of type FlareSolverr at http://flaresolverr:8191
  # and tag the Cloudflare-protected indexers with it.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    profiles: ["flaresolverr"]
    restart: unless-stopped
    # Headless Chromium can crash with Docker's default 64MB /dev/shm.
    shm_size: "256m"
    environment:
      LOG_LEVEL: ${FLARESOLVERR_LOG_LEVEL:-info}
      TZ: ${TZ:-Etc/UTC}
    expose: ["8191"]
    networks: [internal]

  # Optional edge reverse proxy (TLS termination). Enable with: --profile proxy
  proxy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    depends_on: [frontend, backend]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks: [internal]

volumes:
  postgres_data:
  redis_data:
  downloads:
  caddy_data:
  prowlarr_config:

networks:
  internal:
    driver: bridge
