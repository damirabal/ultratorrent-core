# Development dependencies only — run the apps locally with `npm run dev`.
# Usage: docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ultratorrent
      POSTGRES_PASSWORD: ultratorrent
      POSTGRES_DB: ultratorrent
    ports:
      - "5432:5432"
    volumes:
      - pg_dev:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_dev:
