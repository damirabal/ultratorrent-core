name: Security checks

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # weekly

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Assert no private keys committed
        run: |
          if git ls-files | grep -E '\.(pem|key)$|/keys/' | grep -vE 'apikeys'; then
            echo "::error::private key material must not be committed"; exit 1
          fi
          echo "OK: no committed key material"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: npm audit — BLOCK on critical prod advisories
        # Enforcing floor: a critical runtime dependency fails the build. Scoped to
        # prod deps (--omit=dev) so dev/CLI transitives don't block. High+ transitive
        # advisories (qs/express via NestJS) still need the NestJS 11 upgrade and are
        # reported below, not blocked, until then.
        run: npm audit --omit=dev --audit-level=critical
      - name: npm audit (high+, report only)
        run: npm audit --audit-level=high || true

  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - name: License compliance report
        run: npx license-checker --summary || true

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Community image
        run: docker build -f apps/backend/Dockerfile -t ultratorrent/community:backend .
      - name: Trivy image scan — BLOCK on fixable critical
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ultratorrent/community:backend
          severity: CRITICAL
          ignore-unfixed: true # don't fail on base-image CVEs with no fix yet
          exit-code: '1'
      - name: Trivy image scan (high+, report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ultratorrent/community:backend
          severity: HIGH,CRITICAL
          exit-code: '0'
