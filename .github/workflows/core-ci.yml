name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build shared (required before lint/typecheck)
        run: npm run build --workspace @ultratorrent/shared
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Prisma generate (typecheck needs the client)
        run: npm run prisma:generate
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t ultratorrent/backend .
      - name: Build frontend image
        run: docker build -f apps/frontend/Dockerfile -t ultratorrent/frontend .
