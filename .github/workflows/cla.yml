name: CLA Assistant

# Requires contributors to sign the CLA (CLA.md) before their PR can be merged.
# Signatures are recorded in signatures/version1/cla.json on the default branch.
# NOTE: this workflow is published to the Community repo, where external
# contributions arrive; on the Enterprise repo it is effectively inert (the
# maintainer pushes directly rather than via PRs).
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# The default GITHUB_TOKEN in the pull_request_target context has write access to
# the base repo, so no extra PAT is needed for same-repo signature storage.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # Only act on the sign/recheck comment or on PR events.
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/damirabal/ultratorrent-core/blob/main/CLA.md'
          # Store signatures on the repository's default branch.
          branch: ${{ github.event.repository.default_branch }}
          # Maintainer + bots never need to sign.
          allowlist: 'UltraTorrent,damirabal,dependabot[bot],*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
