server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # This container listens on 8080 but is published on some other port (8888, 80
  # behind a proxy, …). nginx builds absolute redirects from the *listening* port,
  # so any 301 it generates would send the browser to :8080 — a port that is not
  # open from outside. Relative redirects keep the client on the URL it came in on.
  # Server-level, because directory redirects fire outside any location block.
  absolute_redirect off;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Bundled documentation — the full site, served offline from this image.
  # It needs its own block: without one, the SPA fallback above would answer a
  # mistyped docs URL with the application shell instead of a 404.
  location = /docs {
    return 301 /docs/;
  }
  location /docs/ {
    # Docusaurus emits `modules.html` AND a `modules/` directory of leaf pages, so a
    # trailing-slash request resolves to the directory — which has no index.html and
    # 404s. Drop the slash and let try_files find the page. (`/docs/` itself is
    # excluded: the pattern requires at least one character after it.)
    rewrite ^(/docs/.+)/$ $1 permanent;

    # `$uri.html` MUST come before `$uri`/`$uri/`. Docusaurus emits both a
    # `develop.html` page and a `develop/` directory (holding that section's leaf
    # pages). Try `$uri` first and nginx resolves /docs/develop to the DIRECTORY,
    # 301s to /docs/develop/, finds no index.html there, and returns 403 — so every
    # section landing page in the bundled manual was unreachable.
    try_files $uri.html $uri $uri/ =404;

    # A category folder that genuinely has no landing page (e.g. /docs/help/) would
    # otherwise be a bare 403; serve the docs site's own 404 page instead.
    error_page 403 =404 /docs/404.html;
  }

  # API proxy
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # WebSocket proxy
  location /ws/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
